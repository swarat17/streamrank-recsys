name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── Job 1: Lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linters
        run: pip install ruff==0.4.4 black==24.4.2

      - name: ruff check
        run: ruff check src/ tests/

      - name: black check
        run: black --check src/ tests/

  # ── Job 2: Unit tests ──────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install package
        run: pip install -e .

      - name: Run unit tests
        env:
          # Dummy env vars so modules that read env at import time don't crash
          ES_HOST: "http://localhost:9200"
          REDIS_HOST: "localhost"
          MLFLOW_TRACKING_URI: "sqlite:///mlruns_ci.db"
        run: |
          pytest tests/unit/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml

  # ── Job 3: Docker build ────────────────────────────────────────────────────
  docker-build:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create stub model artifacts
        # The Dockerfile COPYs models/ — create empty stubs so the build doesn't fail.
        # The health check uses MODELS_OPTIONAL=true to skip model loading.
        run: |
          mkdir -p models/cf models/ranker
          touch models/cf/.keep models/ranker/.keep

      - name: Build Docker image
        run: docker build -t streamrank-recsys:ci .

      - name: Start container
        run: |
          docker run -d --name recsys-ci \
            -p 8000:8000 \
            -e ES_HOST=http://localhost:9200 \
            -e REDIS_HOST=localhost \
            -e MLFLOW_TRACKING_URI=sqlite:///mlflow_ci.db \
            -e MODELS_OPTIONAL=true \
            streamrank-recsys:ci

      - name: Wait for container to start
        run: sleep 8

      - name: Health check
        run: |
          curl --fail --retry 3 --retry-delay 3 \
            http://localhost:8000/health || \
          (docker logs recsys-ci && exit 1)

      - name: Stop container
        if: always()
        run: docker stop recsys-ci && docker rm recsys-ci
